name: RentFlow Scheduler

on:
  workflow_dispatch:

  schedule:
    - cron: '30 3 * * *'

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rentflow-backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download Dependencies
        run: go mod download

      - name: Run Scheduler
        run: go run cmd/scheduler/main.go